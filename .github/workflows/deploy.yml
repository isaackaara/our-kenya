name: Deploy to Cloudflare Pages

on:
  push:
    branches: [v4]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build Quartz
        run: npx quartz build

      - name: Build Pagefind search index
        run: npx pagefind --site public --output-path public/pagefind

      - name: Extract graph data
        run: npm run extract-graph

      - name: Generate game data
        run: npm run generate-games

      - name: Slim search index (Cloudflare 25MB file limit)
        run: |
          node -e "
          const fs = require('fs');
          const path = 'public/static/contentIndex.json';
          if (!fs.existsSync(path)) { console.log('No index found'); process.exit(0); }
          const idx = JSON.parse(fs.readFileSync(path, 'utf8'));
          const slim = {};
          for (const [k, v] of Object.entries(idx)) {
            slim[k] = { title: v.title, tags: v.tags || [], date: v.date, aliases: v.aliases || [] };
          }
          fs.writeFileSync(path, JSON.stringify(slim));
          const mb = (fs.statSync(path).size / 1024 / 1024).toFixed(1);
          console.log('Index slimmed to ' + mb + ' MB');
          "

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy public --project-name=our-kenya
