<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Background: deep forest green rounded square -->
  <rect width="100" height="100" rx="20" ry="20" fill="#1b3d2f"/>

  <!-- Edges: connecting lines between nodes -->
  <!-- Central hub to top-right node -->
  <line x1="50" y1="52" x2="76" y2="28" stroke="#a8c5a0" stroke-width="4.5" stroke-linecap="round" opacity="0.75"/>
  <!-- Central hub to bottom-left node -->
  <line x1="50" y1="52" x2="24" y2="74" stroke="#a8c5a0" stroke-width="4.5" stroke-linecap="round" opacity="0.75"/>
  <!-- Central hub to right node -->
  <line x1="50" y1="52" x2="80" y2="62" stroke="#a8c5a0" stroke-width="3.5" stroke-linecap="round" opacity="0.6"/>
  <!-- Top-right to right node -->
  <line x1="76" y1="28" x2="80" y2="62" stroke="#c4714a" stroke-width="3" stroke-linecap="round" opacity="0.55"/>
  <!-- Bottom-left to right node -->
  <line x1="24" y1="74" x2="80" y2="62" stroke="#c4714a" stroke-width="3" stroke-linecap="round" opacity="0.5"/>

  <!-- Central hub node: largest, off-white/cream -->
  <circle cx="50" cy="52" r="11" fill="#f2ece2"/>

  <!-- Top-right node: terracotta -->
  <circle cx="76" cy="28" r="8" fill="#c4714a"/>

  <!-- Bottom-left node: deep terracotta/sienna -->
  <circle cx="24" cy="74" r="8" fill="#b85c38"/>

  <!-- Right node: muted sage green -->
  <circle cx="80" cy="62" r="6" fill="#6b9e7e"/>
</svg>
